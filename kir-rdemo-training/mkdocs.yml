site_name: Building R Packages — A Modern Guide
site_description: A hands-on workshop for building, documenting, testing, and distributing R packages on the BMRC cluster
site_author: KIR Research Computing
repo_url: https://github.com/kir-rescomp/kir-rdemo
repo_name: kir-rescomp/kir-rdemo
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - tables
  - footnotes

nav:
  - Home: index.md
  - Episodes:
      - "Episode 1: From Script to Package": episodes/episode01.md
      - "Episode 2: Docs That Write Themselves": episodes/episode02.md
      - "Episode 3: Test-Driven Confidence": episodes/episode03.md
      - "Episode 4: Ship It": episodes/episode04.md
  - Reference:
      - Package Cheatsheet: reference/cheatsheet.md
